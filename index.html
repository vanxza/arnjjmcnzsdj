<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday, Hubby! ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Times New Roman", Times, serif;
}

body{
color:white;
overflow-x:hidden;
background:black;
}

/* BACKGROUND */
#passwordScreen,
#giftScreen,
#mainContent{
height:100vh;
background:
linear-gradient(rgba(139,30,47,.45),rgba(245,230,211,.35)),
url('assets/bg.jpg');
background-size:cover;
background-position:center;
}

/* PASSWORD */
#passwordScreen{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
overflow:hidden;
}

.password-box{
background:rgba(255,255,255,0.18);
padding:30px;
border-radius:25px;
backdrop-filter:blur(12px);
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
text-align:center;
margin-top:10px;
}

button{
margin-top:12px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* FLOATING HEARTS */
.floating-heart{
position:absolute;
width:25px;
opacity:0.9;
animation:floatHeart linear infinite;
pointer-events:none;
mix-blend-mode:screen;
}

@keyframes floatHeart{
0%{transform:translateY(100vh);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* GIFT */
#giftScreen{
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
}

.gift-container{
text-align:center;
}

#giftBox{
width:300px;
cursor:pointer;
}

/* MAIN */
#mainContent{
display:none;
padding:20px;
}

/* POPUPS */
.section{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
justify-content:center;
align-items:center;
}

.section.active{
display:flex;
}

.box{
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
text-align:center;
}

/* COUNTER */
#loveCounter{
font-size:20px;
}

</style>
</head>

<body>

<!-- PASSWORD -->
<section id="passwordScreen">
<div class="password-box">
<h3>Enter Password ❤️</h3>
<input type="password" id="password">
<button onclick="checkPassword()">Unlock</button>
</div>
</section>

<!-- GIFT -->
<section id="giftScreen">
<div class="gift-container">
<img src="assets/giftbox.png" id="giftBox">
<p>Tap 3 times ❤️</p>
</div>
</section>

<!-- MAIN -->
<div id="mainContent">

<h1 style="text-align:center;">Happy Birthday ❤️</h1>

<div class="menu">

<div onclick="openPopup('letter')">📩</div>
<div onclick="openPopup('video')">🎥</div>
<div onclick="openPopup('memories')">📸</div>
<div onclick="openPopup('photo1')">💌</div>

</div>

<!-- LETTER -->
<div id="letter" class="section">
<div class="box">
<p>Happy Birthday my love ❤️</p>
</div>
</div>

<!-- VIDEO -->
<div id="video" class="section">
<div class="box">
<video id="greetingVideo" controls>
<source src="assets/greeting-video.mp4">
</video>
</div>
</div>

<!-- MEMORIES -->
<div id="memories" class="section">
<div class="box">
<h2 id="loveCounter">Loading...</h2>
</div>
</div>

<!-- ICON 4 (PHOTO + VOICE FIXED) -->
<div id="photo1" class="section">
<div class="box">

<img src="assets/photo1.jpg" style="max-width:300px;">

<p>My baby ❤️</p>

<button onclick="playVoice()">Play Voice ❤️</button>

</div>
</div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="assets/music.mp3">
</audio>

<audio id="voiceMessage">
<source src="assets/voice.mp3">
</audio>

<script>

/* ELEMENTS */
const music=document.getElementById("bgMusic");
const voice=document.getElementById("voiceMessage");
const video=document.getElementById("greetingVideo");

/* FLOATING HEARTS */
for(let i=0;i<15;i++){
const heart=document.createElement("img");
heart.src="assets/heart.png";
heart.classList.add("floating-heart");
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.getElementById("passwordScreen").appendChild(heart);
}

/* PASSWORD */
function checkPassword(){
if(document.getElementById("password").value==="052404"){
document.getElementById("passwordScreen").style.display="none";
document.getElementById("giftScreen").style.display="flex";
music.play().catch(()=>{});
}
}

/* GIFT TAP */
let giftClicks=0;

document.getElementById("giftBox").addEventListener("click",()=>{
giftClicks++;
if(giftClicks>=3){
document.getElementById("giftScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
startCounter();
}
});

/* VOICE FIX */
function playVoice(){

music.pause();
voice.currentTime=0;

voice.play().then(()=>{
voice.onended=()=>{
music.play().catch(()=>{});
};
}).catch(()=>{
alert("Tap again ❤️");
});

}

/* COUNTER */
const startDate=new Date("September 26, 2025 10:05:00");

function startCounter(){
setInterval(()=>{

const diff=new Date()-startDate;

const days=Math.floor(diff/86400000);
const hours=Math.floor(diff/3600000%24);
const mins=Math.floor(diff/60000%60);
const secs=Math.floor(diff/1000%60);

document.getElementById("loveCounter").innerHTML=
`❤️ ${days}d ${hours}h ${mins}m ${secs}s`;

},1000);
}

/* POPUPS */
function openPopup(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* VIDEO CONTROL */
if(video){
video.addEventListener("play",()=>music.pause());
video.addEventListener("ended",()=>music.play().catch(()=>{}));
}

</script>

</body>
</html>
