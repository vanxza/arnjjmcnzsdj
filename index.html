<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to bottom,#ffdde8,#ffd1e3,#ffc2da);
overflow-x:hidden;
color:white;
}

/* PASSWORD SCREEN */
#passwordScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
linear-gradient(rgba(139,30,47,.4),rgba(245,230,211,.4)),
url('assets/bg.jpg');
background-size:cover;
background-position:center;
}

.password-box{
background:rgba(255,255,255,0.18);
padding:30px;
border-radius:25px;
backdrop-filter:blur(12px);
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
text-align:center;
margin-top:10px;
}

button{
margin-top:12px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* MAIN */
#mainContent{
display:none;
padding:20px;
}

/* ICON MENU */
.menu{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.2);
padding:18px;
border-radius:20px;
width:110px;
cursor:pointer;
backdrop-filter:blur(10px);
text-align:center;
}

.card img{
width:55px;
height:55px;
}

/* POPUP SYSTEM */
.section{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.section.active{
display:flex;
}

/* POPUP BOX */
.box{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
max-width:750px;
text-align:center;
backdrop-filter:blur(10px);
}

/* IMAGES */
img{
max-width:100%;
border-radius:15px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

/* VIDEO FIX */
video{
width:320px;
max-width:90%;
border-radius:15px;
background:black;
}

/* CLOSE BY CLICK */
.section{
cursor:pointer;
}

.box{
cursor:default;
}

</style>
</head>

<body>

<!-- PASSWORD -->
<section id="passwordScreen">
<div class="password-box">

<h3>Enter Password</h3>
<input type="password" id="password">
<button onclick="checkPassword()">Unlock</button>

<p id="error"></p>

</div>
</section>

<!-- MAIN -->
<div id="mainContent">

<!-- ICON MENU (ONLY SHOW AFTER PASSWORD) -->
<div class="menu" id="mainMenu">

<div class="card" onclick="openPopup('letter')">
<img src="assets/icon1.png">
</div>

<div class="card" onclick="openPopup('photo1')">
<img src="assets/icon2.png">
</div>

<div class="card" onclick="openPopup('memories')">
<img src="assets/icon3.png">
</div>

<div class="card" onclick="openPopup('video')">
<img src="assets/icon4.png">
</div>

</div>

<!-- LETTER (ICON 1) -->
<div id="letter" class="section">
<div class="box">
<p>
Happy birthday, hubby ❤️ Another year older but still my favorite person ever. I miss you always 🥺❤️
</p>
</div>
</div>

<!-- PHOTO 1 (ICON 2) -->
<div id="photo1" class="section">
<div class="box">
<img src="assets/photo1.jpg">
<p>my handsome baby ❤️</p>
</div>
</div>

<!-- MEMORIES (ICON 3) -->
<div id="memories" class="section">
<div class="box">

<div class="gallery">
<img src="assets/photo1.jpg">
<img src="assets/photo2.jpg">
<img src="assets/photo3.jpg">
<img src="assets/photo4.jpg">
<img src="assets/photo5.jpg">
<img src="assets/photo6.jpg">
</div>

<p>
You are my happiness ❤️<br>
I love you endlessly ❤️<br>
Distance will never break us ❤️
</p>

</div>
</div>

<!-- VIDEO (ICON 4) -->
<div id="video" class="section">
<div class="box">
<video id="vid" controls>
<source src="assets/greeting-video.mp4" type="video/mp4">
</video>
</div>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="assets/music.mp3">
</audio>

<script>

const music=document.getElementById("music");
const video=document.getElementById("vid");

/* PASSWORD */
function checkPassword(){

if(document.getElementById("password").value==="052404"){
document.getElementById("passwordScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
music.play().catch(()=>{});
}
else{
document.getElementById("error").innerText="A very special day❤️";
}

}

/* OPEN POPUP (ONLY WHEN CLICKED) */
function openPopup(id){
document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");
}

/* CLICK OUTSIDE CLOSE POPUP */
document.addEventListener("click",function(e){

if(e.target.classList.contains("section")){
document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});
}

});

/* VIDEO MUSIC CONTROL */
video?.addEventListener("play",()=>music.pause());
video?.addEventListener("ended",()=>music.play());

</script>

</body>
</html>
