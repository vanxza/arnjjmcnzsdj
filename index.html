<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to bottom,#ffdde8,#ffd1e3,#ffc2da);
color:white;
overflow-x:hidden;
}

/* PETALS */
.petals{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.petal{
position:absolute;
top:-20px;
font-size:18px;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0deg);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(120vh) rotate(360deg);opacity:0;}
}

/* GLOW */
.glow{
text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d,0 0 40px #ff4d6d;
}

/* PASSWORD SCREEN */
#passwordScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:
linear-gradient(rgba(139,30,47,.4),rgba(245,230,211,.4)),
url('assets/bg.jpg');
background-size:cover;
background-position:center;
padding:20px;
}

.password-box{
background:rgba(255,255,255,0.18);
padding:35px;
border-radius:30px;
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(255,77,109,.4);
width:320px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:15px;
text-align:center;
font-size:16px;
outline:none;
}

button{
padding:12px 25px;
margin-top:15px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 15px #ff4d6d;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* MAIN */
#mainContent{
display:none;
position:relative;
z-index:2;
min-height:100vh;
padding-bottom:100px;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(139,30,47,.3),rgba(245,230,211,.3)),
url('assets/bg.jpg');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:52px;
margin-bottom:15px;
}

.hero p{
max-width:700px;
line-height:2;
font-size:18px;
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:50px;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.2);
padding:30px;
width:220px;
border-radius:30px;
cursor:pointer;
transition:.4s;
backdrop-filter:blur(12px);
box-shadow:0 8px 25px rgba(255,105,180,.35);
display:flex;
justify-content:center;
align-items:center;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

/* ICON IMAGE */
.card img{
width:70px;
height:70px;
border-radius:15px;
}

/* POPUPS */
.section{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.section.active{
display:flex;
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

/* LETTER */
.letter-box{
max-width:700px;
background:rgba(255,255,255,0.18);
padding:35px;
border-radius:30px;
line-height:2;
font-size:18px;
backdrop-filter:blur(12px);
text-align:center;
}

/* GALLERY FIX (NO CUT IMAGES + SAME SIZE) */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
width:100%;
max-width:900px;
}

.gallery img{
width:100%;
height:200px;
object-fit:contain;
background:white;
padding:8px;
border-radius:20px;
display:block;
}

/* VIDEO */
video{
width:320px;
max-width:90%;
border-radius:25px;
}

/* MUSIC BUTTON */
.music-btn{
position:fixed;
top:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
}

</style>
</head>

<body>

<div class="petals"></div>

<!-- PASSWORD -->
<section id="passwordScreen">
<div class="password-box">

<h1 class="glow">A surprise made with love ❤️</h1>

<input type="password" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Unlock Surprise</button>

<p id="error"></p>

</div>
</section>

<!-- MAIN -->
<div id="mainContent">

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<section class="hero">

<h1 class="glow">Happy Birthday ❤️</h1>

<p>
I made this world just for you.
Even distance can’t change how much I love you.
</p>

<div class="menu">

<div class="card" onclick="showSection('letterSection')">
<img src="assets/icon2.png">
</div>

<div class="card" onclick="showSection('flowerSection')">
<img src="assets/icon1.png">
</div>

<div class="card" onclick="showSection('videoSection')">
<img src="assets/icon3.png">
</div>

</div>

</section>

<!-- LETTER -->
<section id="letterSection" class="section">
<div class="letter-box">
Happy birthday, love ❤️<br><br>
Even though we’re far, I’m always with you.<br><br>
I love you always ❤️
</div>
</section>

<!-- FLOWER (6 PHOTOS FIXED) -->
<section id="flowerSection" class="section">
<div class="gallery">

<img src="assets/photo1.jpg">
<img src="assets/photo2.jpg">
<img src="assets/photo3.jpg">
<img src="assets/photo4.jpg">
<img src="assets/photo5.jpg">
<img src="assets/photo6.jpg">

</div>
</section>

<!-- VIDEO -->
<section id="videoSection" class="section">
<video controls>
<source src="assets/greeting-video.mp4">
</video>
</section>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="assets/music.mp3">
</audio>

<script>

const music=document.getElementById("bgMusic");

/* PASSWORD */
function checkPassword(){

if(document.getElementById("password").value==="052404"){
document.getElementById("passwordScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
music.play().catch(()=>{});
}
else{
document.getElementById("error").innerText="Wrong password ❤️";
}

}

/* MUSIC */
function toggleMusic(){
music.paused ? music.play() : music.pause();
}

/* POPUP SECTIONS */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* CLOSE ON OUTSIDE CLICK */
document.addEventListener("click",function(e){
if(e.target.classList.contains("section")){
e.target.classList.remove("active");
}
});

/* PETALS */
function createPetal(){
const p=document.createElement("div");
p.classList.add("petal");
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*5+5)+"s";
document.querySelector(".petals").appendChild(p);
setTimeout(()=>p.remove(),10000);
}
setInterval(createPetal,200);

</script>

</body>
</html>
