<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #8b1e2f, #f5e6d3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN BOX */
.container {
    text-align: center;
}

/* LANDSCAPE LETTER STYLE */
.letter {
    background: rgba(255, 245, 235, 0.95);
    padding: 25px 40px;
    border-radius: 20px;
    font-size: 32px;
    font-weight: bold;
    color: #8b1e2f;
    letter-spacing: 2px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    margin-bottom: 40px;
}

/* ICON ROW */
.icons {
    display: flex;
    justify-content: center;
    gap: 30px;
}

/* ICON STYLE */
.icon {
    width: 90px;
    height: 90px;
    background: rgba(255,255,255,0.8);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.icon:hover {
    transform: scale(1.1);
}

/* ICON IMAGE */
.icon img {
    width: 60px;
    height: 60px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LANDSCAPE LETTER -->
    <div class="letter">
        HAPPY BIRTHDAY
    </div>

    <!-- ICONS -->
    <div class="icons">

        <!-- ICON 1 -->
        <div class="icon" onclick="openFlower()">
            <img src="assets/icon1.png" alt="icon">
        </div>

        <!-- ICON 2 -->
        <div class="icon" onclick="openLetter()">
            <img src="assets/icon2.png" alt="icon">
        </div>

        <!-- ICON 3 -->
        <div class="icon" onclick="openVideo()">
            <img src="assets/icon3.png" alt="icon">
        </div>

    </div>

</div>

<script>
function openFlower(){
    window.location.href = "flower.html";
}

function openLetter(){
    window.location.href = "letter.html";
}

function openVideo(){
    window.location.href = "video.html";
}
</script>

</body>
</html>
