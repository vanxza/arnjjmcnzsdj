<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Birthday Site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #8b1e2f, #f5e6d3);
}

/* LOGIN SCREEN */
#login {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

#login h2 {
    color: white;
    margin-bottom: 15px;
}

#login input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 200px;
    margin-bottom: 10px;
}

#login button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #f5e6d3;
    cursor: pointer;
    font-weight: bold;
}

/* MAIN SITE */
#site {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* TITLE */
.letter {
    background: rgba(255, 245, 235, 0.95);
    padding: 25px 50px;
    border-radius: 20px;
    font-size: 32px;
    font-weight: bold;
    color: #8b1e2f;
    letter-spacing: 2px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    margin-bottom: 40px;
}

/* ICONS */
.icons {
    display: flex;
    gap: 30px;
}

.icon {
    width: 90px;
    height: 90px;
    background: rgba(255,255,255,0.8);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.icon:hover {
    transform: scale(1.1);
}

.icon img {
    width: 60px;
    height: 60px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Enter Password</h2>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="checkPass()">Enter</button>
</div>

<!-- MAIN SITE -->
<div id="site">

    <div class="letter">
        HAPPY BIRTHDAY
    </div>

    <div class="icons">

        <div class="icon" onclick="goFlower()">
            <img src="assets/icon1.png">
        </div>

        <div class="icon" onclick="goLetter()">
            <img src="assets/icon2.png">
        </div>

        <div class="icon" onclick="goVideo()">
            <img src="assets/icon3.png">
        </div>

    </div>

</div>

<script>
function checkPass(){
    let pass = document.getElementById("pass").value;

    if(pass === "iloveyou"){
        document.getElementById("login").style.display = "none";
        document.getElementById("site").style.display = "flex";
    } else {
        alert("Wrong password!");
    }
}

function goFlower(){
    window.location.href = "flower.html";
}

function goLetter(){
    window.location.href = "letter.html";
}

function goVideo(){
    window.location.href = "video.html";
}
</script>

</body>
</html>
