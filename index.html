<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday, Hubby! ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Times New Roman", Times, serif;
}

body{
color:white;
overflow-x:hidden;
background:black;
}

/* BACKGROUND */
#passwordScreen,
#giftScreen,
#mainContent{
height:100vh;
background:
linear-gradient(rgba(139,30,47,.45),rgba(245,230,211,.35)),
url('assets/bg.jpg');
background-size:cover;
background-position:center;
}

/* PASSWORD */
#passwordScreen{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
overflow:hidden;
}

.password-box{
background:rgba(255,255,255,0.18);
padding:30px;
border-radius:25px;
backdrop-filter:blur(12px);
width:300px;
text-align:center;
box-shadow:0 0 20px rgba(255,255,255,.2);
z-index:2;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
text-align:center;
margin-top:10px;
font-size:15px;
}

button{
margin-top:12px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
font-size:15px;
}

button:hover{
transform:scale(1.05);
}

/* FLOATING HEARTS */
.floating-heart{
position:absolute;
background:transparent;
border:none;
outline:none;
box-shadow:none;
width:25px;
opacity:0.9;
animation:floatHeart linear infinite;
pointer-events:none;
mix-blend-mode:screen;
}

@keyframes floatHeart{
0%{transform:translateY(100vh);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* FLOATING BUBBLES */
.bubble{
position:fixed;
bottom:-100px;
border-radius:50%;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(4px);
animation:bubbleFloat linear forwards;
pointer-events:none;
z-index:999;
}

@keyframes bubbleFloat{
0%{transform:translateY(0) scale(1);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh) scale(1.6);opacity:0;}
}

/* GIFT */
#giftScreen{
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
overflow:hidden;
}

.gift-container{
text-align:center;
animation:floatGift 2s ease-in-out infinite;
}

#giftBox{
width:300px;
max-width:85vw;
cursor:pointer;
transition:.3s;
}

.giftText{
margin-top:20px;
font-size:22px;
}

@keyframes floatGift{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* SHAKE */
.shake{
animation:shake .4s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* MAIN */
#mainContent{
display:none;
padding:20px;
overflow-y:auto;
}

/* TITLE */
.main-title{
text-align:center;
margin-top:15px;
font-size:38px;
text-shadow:0 0 15px rgba(255,255,255,.6);
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.2);
padding:18px;
border-radius:20px;
width:110px;
cursor:pointer;
text-align:center;
}

.card img{
width:55px;
height:55px;
}

/* POPUPS */
.section{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.section.active{
display:flex;
}

/* BOX */
.box{
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
max-width:800px;
text-align:center;
}

/* LOVE COUNTER */
#loveCounter{
font-size:22px;
margin-bottom:20px;
}

</style>
</head>

<body>

<!-- PASSWORD -->
<section id="passwordScreen">
<div class="password-box">
<h3>Enter Password ❤️</h3>
<input type="password" id="password">
<button onclick="checkPassword()">Unlock</button>
<p id="error"></p>
</div>
</section>

<!-- GIFT -->
<section id="giftScreen">
<div class="gift-container">
<img src="assets/giftbox.png" id="giftBox">
<p class="giftText">Tap the gift 3 times ❤️</p>
</div>
</section>

<!-- MAIN -->
<div id="mainContent">

<h1 class="main-title">Happy Birthday, Hubby!❤️</h1>

<p class="subtitle">Different places, same love 🌎❤️</p>

<div class="menu">

<div class="card" onclick="openPopup('letter')">
<img src="assets/icon1.png">
</div>

<div class="card" onclick="openPopup('video')">
<img src="assets/icon2.png">
</div>

<div class="card" onclick="openPopup('memories')">
<img src="assets/icon3.png">
</div>

<div class="card" onclick="openPopup('photo1')">
<img src="assets/icon4.png">
</div>

</div>

<!-- LETTER -->
<div id="letter" class="section">
<div class="box">
<h2>Happy Birthday ❤️</h2>
<p>Your message here...</p>
</div>
</div>

<!-- VIDEO -->
<div id="video" class="section">
<div class="box">
<video id="greetingVideo" controls>
<source src="assets/greeting-video.mp4">
</video>
</div>
</div>

<!-- MEMORIES -->
<div id="memories" class="section">
<div class="box">
<h2 id="loveCounter">Loading...</h2>
</div>
</div>

<!-- PHOTO -->
<div id="photo1" class="section">
<div class="box">
<img src="assets/photo1.jpg" style="max-width:300px;">
<button onclick="playVoice()" class="voice-btn">Play My Voice ❤️</button>
</div>
</div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="assets/music.mp3">
</audio>

<audio id="voiceMessage">
<source src="assets/voice.mp3">
</audio>

<script>

/* ELEMENTS */
const music=document.getElementById("bgMusic");
const voice=document.getElementById("voiceMessage");
const video=document.getElementById("greetingVideo");

/* HEARTS */
for(let i=0;i<15;i++){
const heart=document.createElement("img");
heart.src="assets/heart.png";
heart.classList.add("floating-heart");
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.getElementById("passwordScreen").appendChild(heart);
}

/* PASSWORD */
function checkPassword(){
if(password.value==="052404"){
passwordScreen.style.display="none";
giftScreen.style.display="flex";
music.play().catch(()=>{});
}else{
error.innerText="Hint: A very special day ❤️";
}
}

/* GIFT */
let clicks=0;
giftBox.addEventListener("click",()=>{
clicks++;
if(clicks>=3){
giftScreen.style.display="none";
mainContent.style.display="block";
startEffects();
}
});

/* BUBBLES */
function startEffects(){
setInterval(()=>{
const bubble=document.createElement("div");
bubble.className="bubble";
bubble.style.width=(10+Math.random()*40)+"px";
bubble.style.height=bubble.style.width;
bubble.style.left=Math.random()*100+"vw";
bubble.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(bubble);
setTimeout(()=>bubble.remove(),12000);
},800);
}

/* VOICE */
function playVoice(){
music.pause();
voice.currentTime=0;
voice.play().then(()=>{
voice.onended=()=>music.play();
});
}

/* COUNTER */
const startDate=new Date("September 26, 2025 10:05:00");

setInterval(()=>{
const d=new Date()-startDate;
loveCounter.innerHTML=
Math.floor(d/86400000)+" days ❤️";
},1000);

/* POPUPS */
function openPopup(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
